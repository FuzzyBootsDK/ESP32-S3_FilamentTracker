; PlatformIO Project Configuration — ESP32-S3 Filament Tracker
; https://docs.platformio.org/page/projectconf.html
;
; Build:            PlatformIO > Build
; Upload firmware:  PlatformIO > Upload
; Upload filesystem (LittleFS / data/ folder):
;                   PlatformIO > Upload Filesystem Image
; Monitor serial:   PlatformIO > Monitor
;
; NOTE: Flash size (16 MB), PSRAM, HTTP server, Wi-Fi and MQTT settings are
;       all configured in sdkconfig.defaults — no need to duplicate them here.
;
; Adjust 'board' below to match your exact ESP32-S3 module variant:
;   esp32-s3-devkitc-1        — generic DevKitC-1 (default)
;   lolin_s3                  — LOLIN S3 (16 MB flash, 8 MB OPI PSRAM)
;   esp32s3box                — ESP32-S3-BOX
; The sdkconfig.defaults already targets 16 MB flash + Octal PSRAM,
; so the sdkconfig settings win over any board default flash-size.

[platformio]
default_envs = filament_tracker
src_dir = main
data_dir = ui

[env:filament_tracker]
platform  = espressif32
board     = esp32-s3-devkitc-1
framework = espidf

; ── Pre-build scripts ───────────────────────────────────────────────────────
; Alpine.js removed — UI uses Vanilla JS only, no pre-build download needed.
; extra_scripts = pre:scripts/download_alpine.py

; ── Flash / upload ─────────────────────────────────────────────────────────
; Tells esptool.py about the actual 16 MB module; firmware size is set in
; sdkconfig.defaults via CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y.
board_upload.flash_size   = 16MB
board_upload.maximum_size = 16777216
upload_speed              = 460800

; ── Pre/post build scripts ──────────────────────────────────────────────────
extra_scripts = post:scripts/upload_fs_after.py

; ── Partitions ──────────────────────────────────────────────────────────────
board_build.partitions = partitions.csv

; ── Filesystem (LittleFS) ───────────────────────────────────────────────────
; "Upload Filesystem Image" will pack the contents of ui/ into a LittleFS
; image and flash it to the 'storage' partition defined in partitions.csv.
board_build.filesystem = littlefs

; ── Serial monitor ──────────────────────────────────────────────────────────
monitor_speed   = 115200
monitor_filters = esp32_exception_decoder
